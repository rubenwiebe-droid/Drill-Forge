<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drill Forge</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app">

    <div class="auth-box" id="authBox">
      <h2>Login</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button id="signUpBtn" type="button">Sign Up</button>
      <button id="signInBtn" type="button">Sign In</button>
      <div id="authStatus">Not logged in</div>
    </div>

    <div id="generatorArea" style="display:none;">
      <div class="top-row">
        <h1>Drill Forge</h1>
        <button id="signOutBtn" type="button">Sign Out</button>
      </div>

      <select id="nfpa">
        <option>NFPA 1001</option>
        <option>NFPA 1006</option>
        <option>NFPA 1021</option>
        <option>NFPA 1041</option>
      </select>

      <select id="duration">
        <option>30 minutes</option>
        <option>60 minutes</option>
        <option>2 hours</option>
        <option>4 hours</option>
      </select>

      <select id="type">
        <option>Lesson Plan</option>
        <option>Skill Sheet</option>
      </select>

      <select id="format">
        <option>Simple</option>
        <option>Detailed</option>
      </select>

      <input id="topic" placeholder="Enter topic">

      <input type="file" id="docs" multiple>

      <div id="status">No documents loaded</div>

      <button id="generateBtn" type="button">Generate</button>
      <button id="exportPdfBtn" type="button">Export PDF</button>

      <pre id="output"></pre>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
