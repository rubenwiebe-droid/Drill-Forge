<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drill Forge</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>
<body>
  <div class="app">

    <div class="auth-box" id="authBox">
      <h2>Login</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button id="signUpBtn" type="button">Sign Up</button>
      <button id="signInBtn" type="button">Sign In</button>
      <div id="authStatus">Not logged in</div>
    </div>

    <div id="generatorArea" style="display:none;">
      <div class="top-row">
        <h1>Drill Forge</h1>
        <button id="signOutBtn" type="button">Sign Out</button>
      </div>

      <div class="grid-two">
        <input id="instructorName" placeholder="Instructor name">
        <input id="locationName" placeholder="Location">
      </div>

      <div class="grid-two">
        <select id="nfpa">
          <option>NFPA 1001</option>
          <option>NFPA 1006</option>
          <option>NFPA 1021</option>
          <option>NFPA 1041</option>
        </select>

        <select id="duration">
          <option>30 minutes</option>
          <option>60 minutes</option>
          <option>2 hours</option>
          <option>4 hours</option>
          <option>8 hours</option>
        </select>
      </div>

      <div class="grid-three">
        <select id="type">
          <option>Lesson Plan</option>
          <option>Skill Sheet</option>
        </select>

        <select id="format">
          <option>Simple</option>
          <option>Detailed</option>
        </select>

        <select id="outputDepth">
          <option>Basic</option>
          <option selected>Standard</option>
          <option>Detailed</option>
          <option>Very Detailed</option>
        </select>
      </div>

      <div class="grid-two">
        <select id="deliveryStyle">
          <option>Classroom</option>
          <option>Practical</option>
          <option selected>Mixed</option>
        </select>

        <select id="audienceType">
          <option selected>Firefighter</option>
          <option>Officer</option>
          <option>Instructor</option>
        </select>
      </div>

      <input id="topic" placeholder="Enter topic">

      <div class="options-box">
        <h3>Include in Output</h3>
        <div class="checks-grid">
          <label><input type="checkbox" id="includeJpr" checked> JPR wording</label>
          <label><input type="checkbox" id="includeSafety" checked> Safety considerations</label>
          <label><input type="checkbox" id="includeNotes" checked> Instructor notes</label>
          <label><input type="checkbox" id="includeEval" checked> Evaluation criteria</label>
          <label><input type="checkbox" id="includeAssignment"> Assignment</label>
          <label><input type="checkbox" id="includeReferences" checked> References</label>
        </div>
      </div>

      <button id="generateBtn" type="button">Generate</button>
      <button id="exportPdfBtn" type="button">Export PDF</button>

      <div id="status">Ready</div>
      <pre id="output"></pre>
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
      <h2>Admin Panel</h2>
      <input type="file" id="docs" multiple>
      <button id="uploadDocsBtn" type="button">Upload Documents</button>
      <div id="adminStatus">No admin action yet</div>

      <h3>Uploaded Files</h3>
      <div id="adminFilesList"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
